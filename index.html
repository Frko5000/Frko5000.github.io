<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreWatcher</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: radial-gradient(circle at top right, #1e293b, #0f172a); 
            color: #f8fafc; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
        }
        .container { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 20px; 
            width: 90%; 
            max-width: 800px;
            padding: 20px;
        }
        .header {
            grid-column: span 2;
            text-align: center;
            margin-bottom: 10px;
        }
        .header h1 {
            font-size: 1.8rem;
            letter-spacing: 2px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }
        .card { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(10px);
            padding: 25px; 
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }
        .card:hover { transform: translateY(-5px); border-color: #38bdf8; }
        h3 { margin-bottom: 15px; color: #94a3b8; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        .value { font-size: 2.2rem; font-weight: 800; color: #38bdf8; display: block; }
        .sub-value { font-size: 0.9rem; color: #64748b; margin-top: 5px; }
        .ip-box { grid-column: span 2; display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; }
        .status-dot { width: 10px; height: 10px; background: #22c55e; border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 10px #22c55e; }
        .net-box { grid-column: span 2; display: flex; justify-content: space-around; align-items: center; padding: 15px 25px; }
        .net-item { text-align: center; }
        .net-item .value { font-size: 1.5rem; }
        .na-text { font-size: 1rem; color: #475569; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>CoreWatcher</h1>
            <p style="color: #64748b; font-size: 0.8rem;">System Monitoring Engine</p>
        </div>

        <!-- CPU -->
        <div class="card">
            <h3>CPU Load</h3>
            <span class="value"><span id="cpu">0</span>%</span>
            <div class="sub-value">Temp: <span id="cpuTemp">—</span></div>
        </div>

        <!-- RAM -->
        <div class="card">
            <h3>Memory</h3>
            <span class="value"><span id="ram">0</span>%</span>
            <div class="sub-value"><span id="ramUsed">0</span> / <span id="ramTotal">0</span> GB</div>
        </div>

        <!-- Disk -->
        <div class="card">
            <h3>Disk Storage</h3>
            <span class="value" style="font-size: 1.5rem;"><span id="diskUsed">0</span><span style="color:#64748b; font-size: 1rem;"> / <span id="diskTotal">0</span> GB</span></span>
            <div class="sub-value">Total filesystem capacity</div>
        </div>

        <!-- Uptime -->
        <div class="card">
            <h3>Uptime</h3>
            <span class="value"><span id="uptime">0</span>h</span>
            <div class="sub-value">System running time</div>
        </div>

        <!-- GPU -->
        <div class="card">
            <h3>GPU</h3>
            <span class="value" style="font-size: 1.3rem;" id="gpuName">—</span>
            <div class="sub-value">Temp: <span id="gpuTemp">—</span> &nbsp;|&nbsp; VRAM: <span id="gpuVram">—</span></div>
        </div>

        <!-- Network Speed -->
        <div class="card net-box">
            <div class="net-item">
                <h3>↓ Download</h3>
                <span class="value" id="netRx">0</span>
                <div class="sub-value">MB/s</div>
            </div>
            <div class="net-item">
                <h3>↑ Upload</h3>
                <span class="value" id="netTx">0</span>
                <div class="sub-value">MB/s</div>
            </div>
        </div>

        <!-- IP -->
        <div class="card ip-box">
            <div>
                <span class="status-dot"></span>
                <span style="color: #94a3b8; font-size: 0.9rem;">Network Active</span>
            </div>
            <span id="ip" style="font-family: monospace; color: #818cf8; font-weight: bold;">Loading...</span>
        </div>
    </div>

    <script>
        function setOrNA(id, value, suffix = '') {
            const el = document.getElementById(id);
            if (value === null || value === undefined) {
                el.innerHTML = '<span class="na-text">N/A</span>';
            } else {
                el.innerText = value + suffix;
            }
        }

        async function updateStats() {
            try {
                const res = await fetch('http://localhost:3000/stats');
                const d = await res.json();

                setOrNA('cpu', d.cpu, '%');
                setOrNA('cpuTemp', d.cpuTemp !== null ? d.cpuTemp + '°C' : null);
                setOrNA('ram', d.ram, '%');
                setOrNA('ramUsed', d.ramUsed);
                setOrNA('ramTotal', d.ramTotal);
                setOrNA('diskUsed', d.diskUsed);
                setOrNA('diskTotal', d.diskTotal);
                setOrNA('uptime', d.uptime, 'h');
                setOrNA('ip', d.ip);
                setOrNA('gpuName', d.gpuName);
                setOrNA('gpuTemp', d.gpuTemp !== null ? d.gpuTemp + '°C' : null);
                setOrNA('gpuVram', d.gpuVram !== null ? d.gpuVram + ' MB' : null);
                setOrNA('netRx', d.netRx);
                setOrNA('netTx', d.netTx);
            } catch (err) {
                console.error('Connection lost');
            }
        }

        setInterval(updateStats, 3000);
        updateStats();
    </script>
</body>
</html>
